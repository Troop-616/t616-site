name: Sync Events from TroopWebHost

on:
  schedule:
    # Run daily at 6:00 AM UTC (11:00 PM PST)
    - cron: "0 6 * * *"
  workflow_dispatch: # Allow manual trigger from GitHub UI

permissions:
  contents: write # Needed to commit updated YAML files
  actions: write  # Needed to trigger the deploy workflow

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true

      - name: Install dependencies
        run: |
          uv sync
          uv run playwright install chromium --with-deps

      - name: Sync Events from TroopWebHost
        run: uv run sync-twh-events

      - name: Check for Changes
        id: diff
        run: |
          git diff --quiet content/ || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit Updated Event Data
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/events.yaml content/highlights.yaml
          git commit -m "chore: sync events from TroopWebHost [skip ci]"
          git push

      - name: Trigger Site Deploy
        if: steps.diff.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy.yml',
              ref: 'main'
            });
            console.log('Deploy workflow triggered.');

      - name: No Changes
        if: steps.diff.outputs.changed != 'true'
        run: echo "No event changes detected. Skipping commit and deploy."
